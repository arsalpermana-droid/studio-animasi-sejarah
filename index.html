<!DOCTYPE html>
<html>
<head>
  <title>Studio Animasi Sejarah AI</title>
</head>
<body>

<h2>Generator Cerita Animasi Sejarah AI</h2>

<input type="text" id="judul" placeholder="Judul"><br><br>
<input type="text" id="tokoh" placeholder="Tokoh"><br><br>
<input type="text" id="tahun" placeholder="Tahun"><br><br>
<input type="text" id="konflik" placeholder="Konflik"><br><br>

<button onclick="generatePrompt()">Generate AI</button>

<pre id="output"></pre>

<script>
async function generatePrompt() {
  const judul = document.getElementById("judul").value;
  const tokoh = document.getElementById("tokoh").value;
  const tahun = document.getElementById("tahun").value;
  const konflik = document.getElementById("konflik").value;
  const output = document.getElementById("output");

  output.innerText = "Generating...";

  const apiKey = api key dari google ai studio;

  try {
    const response = await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=" + apiKey,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{
            parts: [{
              text: `Buatkan cerita animasi sejarah 10 scene lengkap dengan hook 3 detik pertama, dialog konsisten dan narasi sinematik.

Judul: ${judul}
Tokoh: ${tokoh}
Tahun: ${tahun}
Konflik: ${konflik}`
            }]
          }]
        })
      }
    );

    const data = await response.json();
    output.innerText = data.candidates[0].content.parts[0].text;

  } catch (error) {
    output.innerText = "Terjadi error: " + error;
  }
}
</script>

</body>
</html>
